<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        /* THE 404 SCREEN (Initial State) */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fff; 
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #error-message { text-align: center; }
        #error-message h1 { font-size: 24px; border-right: 1px solid rgba(0, 0, 0, .3); display: inline-block; margin: 0 20px 0 0; padding: 10px 23px 10px 0; vertical-align: top; }
        #error-message div { display: inline-block; text-align: left; line-height: 49px; height: 49px; vertical-align: middle; }
        #error-message h2 { font-size: 14px; font-weight: normal; line-height: inherit; margin: 0; }

        /* THE ARCADE (Hidden State) */
        :root {
            --sanguine: #8a0303;
            --black: #0a0a0a;
            --dark-grey: #1a1a1a;
            --text: #e0e0e0;
        }

        #arcade-content { display: none; width: 100%; height: 100%; overflow-y: auto; background: var(--black); position: absolute; top: 0; left: 0; }

        /* REVEAL LOGIC */
        body.revealed { background: var(--black); color: var(--text); }
        .revealed #error-message { display: none; }
        .revealed #arcade-content { display: block; }

        /* CHANCE GAMES STYLING */
        header { text-align: center; padding: 60px 20px; border-bottom: 3px solid var(--sanguine); background: linear-gradient(to bottom, #1a0000, #0a0a0a); }
        header h1 { color: var(--sanguine); font-size: clamp(2rem, 8vw, 4rem); text-transform: uppercase; letter-spacing: 8px; margin: 0; }
        
        .grid-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .game-card { background: var(--dark-grey); border: 1px solid #333; transition: 0.3s; }
        .game-card:hover { border-color: var(--sanguine); box-shadow: 0 0 20px var(--sanguine); transform: scale(1.02); }
        .game-card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid var(--sanguine); }
        .game-info { padding: 20px; text-align: center; }
        
        .play-btn { 
            display: inline-block; background: var(--sanguine); color: white; padding: 10px 25px; 
            text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Fake 404 Screen -->
    <div id="error-message">
        <h1>404</h1>
        <div><h2>This page could not be found.</h2></div>
    </div>

    <!-- The Real Website -->
    <div id="arcade-content">
        <header>
            <h1>CHANCE GAMES</h1>
        </header>
        <div class="grid-container">
            <div id="game-grid"></div>
        </div>
    </div>

    <script>
        let inputString = "";
        const secretCode = "777";

        window.addEventListener('keydown', (e) => {
            if (e.key === "7") {
                inputString += "7";
                if (inputString === secretCode) {
                    revealSite();
                }
            } else {
                inputString = ""; // Reset if any other key is pressed
            }
        });

        function revealSite() {
            document.title = "CHANCE GAMES";
            document.body.classList.add('revealed');
            
            const games = [
                { title: "Roulette Red", thumb: "https://via.placeholder.com", link: "#" },
                { title: "Sanguine Slots", thumb: "https://via.placeholder.com", link: "#" },
                { title: "Shadow Dice", thumb: "https://via.placeholder.com", link: "#" }
            ];

            const grid = document.getElementById('game-grid');
            grid.innerHTML = games.map(g => `
                <div class="game-card">
                    <img src="${g.thumb}" alt="${g.title}">
                    <div class="game-info">
                        <h3>${g.title}</h3>
                        <a href="${g.link}" class="play-btn">PLAY</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
